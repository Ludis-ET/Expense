name: 🚀 CI/CD — cPanel FTP Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cpanel-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10.24.0"
  NODE_VERSION: "24"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  ci:
    name: 🧪 CI — Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 💾 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: 📥 Install dependencies
        run: |
          echo "📦 Installing workspace dependencies..."
          pnpm install --frozen-lockfile
          echo "✅ Dependencies installed"

      - name: 🗄️ Generate Prisma Client
        run: |
          echo "🗄️  Generating Prisma client for backend..."
          pnpm --filter @santim/backend db:generate
          echo "✅ Prisma client ready"

      - name: 🔍 Lint
        run: |
          echo "🔍 Running ESLint across workspace..."
          pnpm lint
          echo "✅ Lint passed"

      - name: 🧮 Typecheck
        run: |
          echo "🧮 Running TypeScript checks..."
          pnpm typecheck
          echo "✅ Typecheck passed"

      - name: 🧪 Test
        run: |
          echo "🧪 Running test suite..."
          pnpm test
          echo "✅ All tests passed"

      - name: 🏗️ Build (smoke)
        run: |
          echo "🏗️  Smoke-building both packages..."
          pnpm --filter @santim/backend build
          BACKEND_URL=http://localhost:4000 pnpm --filter @santim/frontend build
          echo "✅ Build smoke test passed"

  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: 📤 CD — Deploy to cPanel via FTP
    needs: ci
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 💾 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: 📥 Install dependencies
        run: |
          echo "📦 Installing dependencies for production build..."
          pnpm install --frozen-lockfile
          echo "✅ Ready to build"

      - name: 🗄️ Generate Prisma Client
        run: pnpm --filter @santim/backend db:generate

      - name: 🔐 Validate FTP secrets
        id: ftp
        run: |
          echo "🔐 Checking required GitHub secrets..."
          missing=0
          if [ -z "${{ secrets.CPANEL_FTP_HOST }}" ]; then echo "❌ Missing secret: CPANEL_FTP_HOST"; missing=1; else echo "✅ CPANEL_FTP_HOST is set"; fi
          if [ -z "${{ secrets.CPANEL_FTP_USERNAME }}" ]; then echo "❌ Missing secret: CPANEL_FTP_USERNAME"; missing=1; else echo "✅ CPANEL_FTP_USERNAME is set"; fi
          if [ -z "${{ secrets.CPANEL_FTP_PASSWORD }}" ]; then echo "❌ Missing secret: CPANEL_FTP_PASSWORD"; missing=1; else echo "✅ CPANEL_FTP_PASSWORD is set"; fi
          if [ -z "${{ secrets.CPANEL_FTP_BACKEND_PATH }}" ]; then echo "❌ Missing secret: CPANEL_FTP_BACKEND_PATH"; missing=1; else echo "✅ CPANEL_FTP_BACKEND_PATH is set"; fi
          if [ -z "${{ secrets.CPANEL_FTP_FRONTEND_PATH }}" ]; then echo "❌ Missing secret: CPANEL_FTP_FRONTEND_PATH"; missing=1; else echo "✅ CPANEL_FTP_FRONTEND_PATH is set"; fi
          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "📖 See docs/DEPLOY-CPANEL.md for setup instructions."
            exit 1
          fi

          PROTOCOL="${{ secrets.CPANEL_FTP_PROTOCOL }}"
          if [ -z "$PROTOCOL" ]; then PROTOCOL="sftp"; fi
          echo "protocol=$PROTOCOL" >> "$GITHUB_OUTPUT"

          PORT="${{ secrets.CPANEL_FTP_PORT }}"
          if [ -z "$PORT" ]; then
            if [ "$PROTOCOL" = "sftp" ]; then PORT="22"; else PORT="21"; fi
          fi
          echo "port=$PORT" >> "$GITHUB_OUTPUT"

          # Normalize FTP/SFTP host (strip protocol, path, port, quotes, whitespace).
          HOST="${{ secrets.CPANEL_FTP_HOST }}"
          HOST="${HOST#ftp://}"
          HOST="${HOST#ftps://}"
          HOST="${HOST#sftp://}"
          HOST="${HOST%%/*}"
          HOST="${HOST%%:*}"
          HOST="${HOST%.}"
          HOST="${HOST#\"}"
          HOST="${HOST%\"}"
          HOST="$(echo "$HOST" | xargs)"
          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "ℹ️  Normalized host length: ${#HOST} chars, protocol: $PROTOCOL, port: $PORT"

          if [ -z "$HOST" ]; then
            echo "❌ CPANEL_FTP_HOST is empty after normalization"
            exit 1
          fi
          if echo "$HOST" | grep -q '@'; then
            echo "❌ CPANEL_FTP_HOST looks like an email — use server IP or FTP hostname from cPanel"
            exit 1
          fi
          if echo "$HOST" | grep -qi 'santim\.lunafh\.com'; then
            echo "❌ CPANEL_FTP_HOST must not be santim.lunafh.com — use cPanel Shared IP"
            exit 1
          fi

          resolves=0
          if getent hosts "$HOST" > /dev/null 2>&1; then resolves=1; fi
          if [[ "$HOST" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then resolves=1; fi

          if [ "$resolves" -eq 0 ]; then
            echo "❌ CPANEL_FTP_HOST cannot be resolved"
            echo ""
            echo "   Fix: cPanel → General Information → Shared IP Address"
            echo "   GitHub → Secrets → CPANEL_FTP_HOST → paste ONLY that IP"
            echo "   Example: 203.0.113.10"
            exit 1
          fi
          echo "✅ Host is valid for $PROTOCOL upload"
          echo "🎉 All FTP credentials present"

      - name: ⚙️ Resolve deploy config
        run: |
          BACKEND_URL="${{ vars.CPANEL_BACKEND_URL }}"
          FRONTEND_BASE="${{ vars.CPANEL_FRONTEND_BASE_PATH }}"
          API_BASE="${{ vars.CPANEL_API_BASE_PATH }}"

          if [ -z "$BACKEND_URL" ]; then
            BACKEND_URL="https://santim.lunafh.com/backend"
            echo "⚠️  CPANEL_BACKEND_URL not set — using default: $BACKEND_URL"
          else
            echo "✅ CPANEL_BACKEND_URL = $BACKEND_URL"
          fi
          if [ -z "$FRONTEND_BASE" ]; then
            FRONTEND_BASE="/frontend"
            echo "⚠️  CPANEL_FRONTEND_BASE_PATH not set — using default: $FRONTEND_BASE"
          else
            echo "✅ CPANEL_FRONTEND_BASE_PATH = $FRONTEND_BASE"
          fi
          if [ -z "$API_BASE" ]; then
            API_BASE="/backend/api/v1"
            echo "⚠️  CPANEL_API_BASE_PATH not set — using default: $API_BASE"
          else
            echo "✅ CPANEL_API_BASE_PATH = $API_BASE"
          fi

          echo "BACKEND_URL=$BACKEND_URL" >> "$GITHUB_ENV"
          echo "CPANEL_FRONTEND_BASE_PATH=$FRONTEND_BASE" >> "$GITHUB_ENV"
          echo "CPANEL_API_BASE_PATH=$API_BASE" >> "$GITHUB_ENV"

      - name: 🏗️ Prepare backend deploy package
        run: |
          echo "🏗️  Building backend deploy bundle..."
          chmod +x scripts/cpanel/prepare-backend.sh
          ./scripts/cpanel/prepare-backend.sh
          echo "📊 Backend package contents:"
          ls -la deploy/backend/

      - name: 🏗️ Prepare frontend deploy package
        env:
          BACKEND_URL: ${{ env.BACKEND_URL }}
          CPANEL_FRONTEND_BASE_PATH: ${{ env.CPANEL_FRONTEND_BASE_PATH }}
          CPANEL_API_BASE_PATH: ${{ env.CPANEL_API_BASE_PATH }}
        run: |
          echo "🏗️  Building frontend deploy bundle..."
          echo "🔗 API proxy target: $BACKEND_URL"
          echo "📁 Frontend base path: ${CPANEL_FRONTEND_BASE_PATH:-/frontend}"
          echo "🌐 Browser API base: ${CPANEL_API_BASE_PATH:-/backend/api/v1}"
          chmod +x scripts/cpanel/prepare-frontend.sh
          ./scripts/cpanel/prepare-frontend.sh
          echo "📊 Frontend package contents:"
          ls -la deploy/frontend/

      - name: 📤 Upload backend to cPanel (SFTP)
        if: steps.ftp.outputs.protocol == 'sftp'
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ steps.ftp.outputs.host }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ steps.ftp.outputs.port }}
          local_path: ./deploy/backend/*
          remote_path: ${{ secrets.CPANEL_FTP_BACKEND_PATH }}
          sftp_only: true

      - name: 📤 Upload backend to cPanel (FTP)
        if: steps.ftp.outputs.protocol != 'sftp'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ steps.ftp.outputs.host }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ steps.ftp.outputs.port }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          local-dir: ./deploy/backend/
          server-dir: ${{ secrets.CPANEL_FTP_BACKEND_PATH }}
          dangerous-clean-slate: false
          log-level: verbose

      - name: 📤 Upload frontend to cPanel (SFTP)
        if: steps.ftp.outputs.protocol == 'sftp'
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ steps.ftp.outputs.host }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ steps.ftp.outputs.port }}
          local_path: ./deploy/frontend/*
          remote_path: ${{ secrets.CPANEL_FTP_FRONTEND_PATH }}
          sftp_only: true

      - name: 📤 Upload frontend to cPanel (FTP)
        if: steps.ftp.outputs.protocol != 'sftp'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ steps.ftp.outputs.host }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ steps.ftp.outputs.port }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          local-dir: ./deploy/frontend/
          server-dir: ${{ secrets.CPANEL_FTP_FRONTEND_PATH }}
          dangerous-clean-slate: false
          log-level: verbose

      - name: 🎉 Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 Deployment finished successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 Backend  → ${{ secrets.CPANEL_FTP_BACKEND_PATH }}  (https://santim.lunafh.com/backend)"
          echo "🌐 Frontend → ${{ secrets.CPANEL_FTP_FRONTEND_PATH }}  (https://santim.lunafh.com/frontend)"
          echo "🔗 API URL  → ${{ env.BACKEND_URL }}"
          echo ""
          echo "⚠️  Post-deploy checklist (first time only):"
          echo "   1. Restart both Node.js apps in cPanel (backend + frontend)"
          echo "   2. Run: cd ~/santim.lunafh.com/backend && npx prisma migrate deploy"
          echo "   3. Backend env: DATABASE_URL, JWT_SECRET, CORS_ORIGINS=https://santim.lunafh.com, APP_URL=https://santim.lunafh.com/frontend"
          echo "   4. Open https://santim.lunafh.com/frontend"
          echo ""
          echo "📖 Full guide: docs/DEPLOY-CPANEL.md"
