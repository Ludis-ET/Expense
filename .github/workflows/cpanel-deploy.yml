name: 🚀 CI/CD — cPanel FTP Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cpanel-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PNPM_VERSION: "10.24.0"
  NODE_VERSION: "24"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  ci:
    name: 🧪 CI — Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 💾 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: 📥 Install dependencies
        run: |
          echo "📦 Installing workspace dependencies..."
          pnpm install --frozen-lockfile
          echo "✅ Dependencies installed"

      - name: 🗄️ Generate Prisma Client
        run: |
          echo "🗄️  Generating Prisma client for backend..."
          pnpm --filter @santim/backend db:generate
          echo "✅ Prisma client ready"

      - name: 🔍 Lint
        run: |
          echo "🔍 Running ESLint across workspace..."
          pnpm lint
          echo "✅ Lint passed"

      - name: 🧮 Typecheck
        run: |
          echo "🧮 Running TypeScript checks..."
          pnpm typecheck
          echo "✅ Typecheck passed"

      - name: 🧪 Test
        run: |
          echo "🧪 Running test suite..."
          pnpm test
          echo "✅ All tests passed"

      - name: 🏗️ Build (smoke)
        run: |
          echo "🏗️  Smoke-building both packages..."
          pnpm --filter @santim/backend build
          BACKEND_URL=http://localhost:4000 pnpm --filter @santim/frontend build
          echo "✅ Build smoke test passed"

  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    name: 📤 CD — Deploy to cPanel via FTP
    needs: ci
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: 💾 Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: 📥 Install dependencies
        run: |
          echo "📦 Installing dependencies for production build..."
          pnpm install --frozen-lockfile
          echo "✅ Ready to build"

      - name: 🗄️ Generate Prisma Client
        run: pnpm --filter @santim/backend db:generate

      - name: 🔐 Validate FTP secrets
        id: ftp
        run: |
          echo "🔐 Checking required GitHub secrets..."
          missing=0
          if [ -z "${{ secrets.CPANEL_FTP_USERNAME }}" ]; then echo "❌ Missing secret: CPANEL_FTP_USERNAME"; missing=1; else echo "✅ CPANEL_FTP_USERNAME is set"; fi
          if [ -z "${{ secrets.CPANEL_FTP_PASSWORD }}" ]; then echo "❌ Missing secret: CPANEL_FTP_PASSWORD"; missing=1; else echo "✅ CPANEL_FTP_PASSWORD is set"; fi
          if [ -z "${{ secrets.CPANEL_FTP_BACKEND_PATH }}" ]; then echo "❌ Missing secret: CPANEL_FTP_BACKEND_PATH"; missing=1; else echo "✅ CPANEL_FTP_BACKEND_PATH is set"; fi
          if [ -z "${{ secrets.CPANEL_FTP_FRONTEND_PATH }}" ]; then echo "❌ Missing secret: CPANEL_FTP_FRONTEND_PATH"; missing=1; else echo "✅ CPANEL_FTP_FRONTEND_PATH is set"; fi

          SERVER_IP="${{ secrets.CPANEL_SERVER_IP }}"
          if [ -z "$SERVER_IP" ]; then SERVER_IP="${{ vars.CPANEL_SERVER_IP }}"; fi
          if [ -n "$SERVER_IP" ]; then echo "✅ CPANEL_SERVER_IP is set"; else echo "ℹ️  CPANEL_SERVER_IP not set (optional if CPANEL_FTP_HOST resolves)"; fi

          if [ -z "${{ secrets.CPANEL_FTP_HOST }}" ] && [ -z "$SERVER_IP" ]; then
            echo "❌ Set CPANEL_FTP_HOST or CPANEL_SERVER_IP"
            missing=1
          elif [ -n "${{ secrets.CPANEL_FTP_HOST }}" ]; then
            echo "✅ CPANEL_FTP_HOST is set"
          fi

          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "📖 See docs/DEPLOY-CPANEL.md for setup instructions."
            exit 1
          fi

          PROTOCOL="${{ secrets.CPANEL_FTP_PROTOCOL }}"
          if [ -z "$PROTOCOL" ]; then PROTOCOL="ftp"; fi
          # cPanel FTP users authenticate on port 21 (plain FTP or explicit FTPS).
          if [ "$PROTOCOL" = "sftp" ]; then
            echo "⚠️  CPANEL_FTP_PROTOCOL=sftp is not supported by this action — use ftp or ftps on port 21"
            PROTOCOL="ftp"
          fi

          PORT="${{ secrets.CPANEL_FTP_PORT }}"
          if [ -z "$PORT" ] || [ "$PORT" = "22" ]; then PORT="21"; fi

          # FTP paths must be RELATIVE to the FTP account home (usually ~/santim.lunafh.com/).
          # Never use /home/lunafhin/... — that creates nested home/lunafhin/... folders on the server.
          BACKEND_DIR="${{ secrets.CPANEL_FTP_BACKEND_PATH }}"
          FRONTEND_DIR="${{ secrets.CPANEL_FTP_FRONTEND_PATH }}"

          normalize_ftp_dir() {
            local d="$1"
            local default="$2"
            if [ -z "$d" ]; then
              echo "$default"
              return
            fi
            # Strip filesystem prefix: /home/cpaneluser/
            d=$(echo "$d" | sed -E 's|^/home/[^/]+/||')
            # Strip domain prefix if user pasted full docroot: santim.lunafh.com/backend → backend
            d=$(echo "$d" | sed -E 's|^.*santim\.lunafh\.com/?||i')
            # Collapse duplicate backend/frontend segments from bad pastes
            d=$(echo "$d" | sed -E 's|^backend/backend/?|backend/|')
            d=$(echo "$d" | sed -E 's|^frontend/frontend/?|frontend/|')
            d="${d#/}"
            if [ -z "$d" ]; then
              echo "/"
            else
              echo "/${d%/}/"
            fi
          }

          BACKEND_DIR=$(normalize_ftp_dir "$BACKEND_DIR" "/backend/")
          FRONTEND_DIR=$(normalize_ftp_dir "$FRONTEND_DIR" "/frontend/")

          echo "backend_dir=$BACKEND_DIR" >> "$GITHUB_OUTPUT"
          echo "frontend_dir=$FRONTEND_DIR" >> "$GITHUB_OUTPUT"
          echo "ℹ️  FTP upload targets (relative to FTP home):"
          echo "   backend  → $BACKEND_DIR   (expect: ~/santim.lunafh.com/backend/)"
          echo "   frontend → $FRONTEND_DIR  (expect: ~/santim.lunafh.com/frontend/)"
          echo ""
          echo "   GitHub secrets should be:  /backend/  and  /frontend/"
          echo "   NOT /home/lunafhin/santim.lunafh.com/backend/"

          # Normalize host input.
          HOST="${{ secrets.CPANEL_FTP_HOST }}"
          HOST="${HOST#ftp://}"
          HOST="${HOST#ftps://}"
          HOST="${HOST#sftp://}"
          HOST="${HOST%%/*}"
          HOST="${HOST%%:*}"
          HOST="${HOST%.}"
          HOST="${HOST#\"}"
          HOST="${HOST%\"}"
          HOST="$(echo "$HOST" | xargs)"

          resolve_ipv4() {
            local name="$1"
            local ip=""
            if [[ "$name" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "$name"
              return 0
            fi
            ip=$(getent ahostsv4 "$name" 2>/dev/null | awk '{print $1}' | head -1)
            if [ -n "$ip" ]; then echo "$ip"; return 0; fi
            if command -v dig >/dev/null 2>&1; then
              ip=$(dig +short A "$name" @8.8.8.8 2>/dev/null | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
              if [ -n "$ip" ]; then echo "$ip"; return 0; fi
            fi
            return 1
          }

          CONNECT_HOST=""
          if [ -n "$HOST" ]; then
            if echo "$HOST" | grep -q '@'; then
              echo "❌ CPANEL_FTP_HOST looks like an email — use server IP or hostname"
              exit 1
            fi
            if echo "$HOST" | grep -qi 'santim\.lunafh\.com'; then
              echo "❌ CPANEL_FTP_HOST must not be santim.lunafh.com"
              exit 1
            fi
            CONNECT_HOST=$(resolve_ipv4 "$HOST" || true)
          fi

          # ftp.lunafh.com does not exist in public DNS — use cPanel Shared IP instead.
          if [ -z "$CONNECT_HOST" ] && [ -n "$SERVER_IP" ]; then
            echo "⚠️  Using CPANEL_SERVER_IP (hostname did not resolve)"
            CONNECT_HOST="$SERVER_IP"
          fi

          if [ -z "$CONNECT_HOST" ]; then
            echo "❌ Cannot resolve deploy host"
            echo ""
            echo "   Add GitHub secret CPANEL_SERVER_IP with your cPanel Shared IP:"
            echo "   cPanel home → General Information → Shared IP Address"
            echo ""
            echo "   Keep CPANEL_FTP_HOST as ftp.lunafh.com or delete it — IP is enough."
            exit 1
          fi

          echo "protocol=$PROTOCOL" >> "$GITHUB_OUTPUT"
          echo "port=$PORT" >> "$GITHUB_OUTPUT"
          echo "host=$CONNECT_HOST" >> "$GITHUB_OUTPUT"
          echo "✅ Deploy target: $CONNECT_HOST:$PORT ($PROTOCOL)"
          echo "🎉 All deploy credentials present"

      - name: 🔌 Test FTP port reachability
        run: |
          HOST="${{ steps.ftp.outputs.host }}"
          PORT="${{ steps.ftp.outputs.port }}"
          echo "🔌 Probing $HOST:$PORT from GitHub Actions..."
          if timeout 20 bash -c "echo > /dev/tcp/$HOST/$PORT" 2>/dev/null; then
            echo "✅ Port $PORT is reachable"
          else
            echo "❌ Cannot open TCP connection to $HOST:$PORT"
            echo ""
            echo "   Your host firewall often blocks GitHub Actions IPs on FTP."
            echo "   Ask your host (lunafh.com) to:"
            echo "   • Allow inbound TCP port $PORT from the internet"
            echo "   • Open passive FTP ports (usually 49152–65534) in CSF/firewall"
            echo ""
            echo "   Also verify GitHub secrets:"
            echo "   • CPANEL_SERVER_IP = cPanel → General Information → Shared IP"
            echo "   • CPANEL_FTP_USERNAME = full FTP login (e.g. user@lunafh.com)"
            echo "   • CPANEL_FTP_PROTOCOL = ftp (try ftp before ftps)"
            exit 1
          fi

      - name: ⚙️ Resolve deploy config
        run: |
          BACKEND_URL="${{ vars.CPANEL_BACKEND_URL }}"
          FRONTEND_BASE="${{ vars.CPANEL_FRONTEND_BASE_PATH }}"
          API_BASE="${{ vars.CPANEL_API_BASE_PATH }}"

          if [ -z "$BACKEND_URL" ]; then
            BACKEND_URL="https://santim.lunafh.com/backend"
            echo "⚠️  CPANEL_BACKEND_URL not set — using default: $BACKEND_URL"
          else
            echo "✅ CPANEL_BACKEND_URL = $BACKEND_URL"
          fi
          if [ -z "$FRONTEND_BASE" ]; then
            FRONTEND_BASE="/frontend"
            echo "⚠️  CPANEL_FRONTEND_BASE_PATH not set — using default: $FRONTEND_BASE"
          else
            echo "✅ CPANEL_FRONTEND_BASE_PATH = $FRONTEND_BASE"
          fi
          if [ -z "$API_BASE" ]; then
            API_BASE="/backend/api/v1"
            echo "⚠️  CPANEL_API_BASE_PATH not set — using default: $API_BASE"
          else
            echo "✅ CPANEL_API_BASE_PATH = $API_BASE"
          fi

          echo "BACKEND_URL=$BACKEND_URL" >> "$GITHUB_ENV"
          echo "CPANEL_FRONTEND_BASE_PATH=$FRONTEND_BASE" >> "$GITHUB_ENV"
          echo "CPANEL_API_BASE_PATH=$API_BASE" >> "$GITHUB_ENV"

      - name: 🏗️ Prepare backend deploy package
        run: |
          echo "🏗️  Building backend deploy bundle..."
          chmod +x scripts/cpanel/prepare-backend.sh
          ./scripts/cpanel/prepare-backend.sh
          echo "📊 Tarball contents (dist must be listed):"
          tar tzf deploy/santim-backend.tgz | head -30

      - name: 🏗️ Prepare frontend deploy package
        env:
          BACKEND_URL: ${{ env.BACKEND_URL }}
          CPANEL_FRONTEND_BASE_PATH: ${{ env.CPANEL_FRONTEND_BASE_PATH }}
          CPANEL_API_BASE_PATH: ${{ env.CPANEL_API_BASE_PATH }}
        run: |
          echo "🏗️  Building frontend deploy bundle..."
          echo "🔗 API proxy target: $BACKEND_URL"
          echo "📁 Frontend base path: ${CPANEL_FRONTEND_BASE_PATH:-/frontend}"
          echo "🌐 Browser API base: ${CPANEL_API_BASE_PATH:-/backend/api/v1}"
          chmod +x scripts/cpanel/prepare-frontend.sh
          ./scripts/cpanel/prepare-frontend.sh
          echo "📊 Frontend tarball:"
          ls -la deploy/santim-frontend.tgz
          tar tzf deploy/santim-frontend.tgz | grep -E 'server.js|node_modules/next' | head -10

      - name: 🧹 Clear & upload backend tarball (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ steps.ftp.outputs.host }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ steps.ftp.outputs.port }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          security: loose
          timeout: 600000
          local-dir: ./deploy/ftp-backend/
          server-dir: ${{ steps.ftp.outputs.backend_dir }}
          dangerous-clean-slate: true
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/.ftp-deploy-sync-state.json

      - name: 🧹 Clear & upload frontend tarball (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ steps.ftp.outputs.host }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          port: ${{ steps.ftp.outputs.port }}
          protocol: ${{ steps.ftp.outputs.protocol }}
          security: loose
          timeout: 600000
          local-dir: ./deploy/ftp-frontend/
          server-dir: ${{ steps.ftp.outputs.frontend_dir }}
          dangerous-clean-slate: true
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/.ftp-deploy-sync-state.json

      - name: 🎉 Deployment summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "🎉 Deployment finished successfully!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 Backend  → ${{ secrets.CPANEL_FTP_BACKEND_PATH }}  (https://santim.lunafh.com/backend)"
          echo "🌐 Frontend → ${{ secrets.CPANEL_FTP_FRONTEND_PATH }}  (https://santim.lunafh.com/frontend)"
          echo "🔗 API URL  → ${{ env.BACKEND_URL }}"
          echo ""
          echo "⚠️  Post-deploy (cPanel Terminal — required after each deploy):"
          echo "   CI clears backend/ and frontend/ folders, then uploads fresh .tgz files."
          echo ""
          echo "   cd ~/santim.lunafh.com/backend"
          echo "   tar xzf santim-backend.tgz && npm install --omit=dev"
          echo "   npm run db:deploy   (uses prisma 5 — or: npx prisma@5.22.0 migrate deploy)"
          echo ""
          echo "   cd ~/santim.lunafh.com/frontend"
          echo "   tar xzf santim-frontend.tgz"
          echo ""
          echo "   Restart both Node.js apps (backend: server.js | frontend: frontend/server.js)"
          echo ""
          echo "   ⚠️  Put DATABASE_URL in cPanel Node.js env vars — .env in these folders is wiped each deploy"
